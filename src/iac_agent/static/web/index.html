<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IaC Agent - VSCode-Style Infrastructure Workspace</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- xterm.js Terminal Libraries -->
    <link rel="stylesheet" href="https://unpkg.com/xterm@5.3.0/css/xterm.css" />
    <script src="https://unpkg.com/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://unpkg.com/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://unpkg.com/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Ubuntu', 'Cantarell', sans-serif;
            background: #1e1e1e;
            color: #cccccc;
            overflow: hidden;
        }
        
        #root {
            height: 100vh;
            width: 100vw;
        }
        
        /* VSCode-style scrollbars */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #424242;
            border-radius: 5px;
            border: 2px solid #1e1e1e;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #4f4f4f;
        }
        
        ::-webkit-scrollbar-corner {
            background: #1e1e1e;
        }
        
        /* VSCode-style selection */
        ::selection {
            background: #094771;
            color: #ffffff;
        }
        
        /* Focus styles for accessibility */
        button:focus,
        input:focus,
        textarea:focus,
        select:focus {
            outline: 1px solid #007acc;
            outline-offset: 2px;
        }
        
        /* Loading animation */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #cccccc;
        }
        
        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 2px solid #333333;
            border-top: 2px solid #007acc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Prevent text selection on UI elements */
        .no-select {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading">
            <div class="loading-spinner"></div>
            <div>Loading IaC Agent VSCode Workspace...</div>
        </div>
    </div>
    
    <!-- Initialize Terminal Libraries and WebSocket -->
    <script>
        // Ensure xterm addons are globally available
        window.Terminal = window.Terminal;
        window.FitAddon = window.FitAddon || { FitAddon: window.XtermAddon } || window.XtermFitAddon;
        window.WebLinksAddon = window.WebLinksAddon || window.XtermWebLinksAddon;
        
        // Simple WebSocket manager setup
        window.wsManager = {
            socket: null,
            connected: false,
            
            connect: function() {
                if (this.socket) return;
                
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}/ws`;
                
                this.socket = new WebSocket(wsUrl);
                
                this.socket.onopen = () => {
                    this.connected = true;
                    console.log('✅ WebSocket connected');
                };
                
                this.socket.onclose = () => {
                    this.connected = false;
                    console.log('❌ WebSocket disconnected');
                    // Auto-reconnect after 3 seconds
                    setTimeout(() => this.connect(), 3000);
                };
                
                this.socket.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        
                        // Route messages to appropriate handlers
                        if (data.type === 'pty_spawn' && window.handlePTYSpawn) {
                            window.handlePTYSpawn(data.payload);
                        } else if (data.type === 'pty_output' && window.handlePTYOutput) {
                            window.handlePTYOutput(data.payload);
                        }
                    } catch (e) {
                        console.error('WebSocket message error:', e);
                    }
                };
            },
            
            send: function(message) {
                if (this.connected && this.socket) {
                    this.socket.send(JSON.stringify(message));
                } else {
                    console.warn('WebSocket not connected, queuing message');
                }
            }
        };
        
        // Auto-connect when page loads
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🔧 DOM loaded, starting initialization...');
            window.wsManager.connect();
            
            // Debug: Check if React is available
            if (typeof React === 'undefined') {
                console.error('❌ React not loaded!');
                document.getElementById('root').innerHTML = '<div style="padding:20px;background:#ff4444;color:white;">React not loaded</div>';
                return;
            }
            
            if (typeof ReactDOM === 'undefined') {
                console.error('❌ ReactDOM not loaded!');
                document.getElementById('root').innerHTML = '<div style="padding:20px;background:#ff4444;color:white;">ReactDOM not loaded</div>';
                return;
            }
            
            console.log('✅ React libraries available');
        });
    </script>
    
    <script type="module" src="/static/app.js"></script>
</body>
</html>
